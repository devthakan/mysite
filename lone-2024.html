<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पोर्टल | कानोड़ ग्राम सेवा सहकारी समिति</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* --- Loading Screen Styles --- */
        #loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-text { margin-top: 15px; color: #555; font-weight: 600; font-size: 1.1rem; }

        /* --- Iframe Styling --- */
        iframe {
            width: 100%; height: 100vh;
            border: none; visibility: hidden; /* लोड होने तक छुपा रहेगा */
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">कानोड़ समिति पोर्टल लोड हो रहा है...</div>
        <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">Powered by Jg Legha</div>
    </div>

    <iframe 
        id="portal-iframe"
        src="https://script.google.com/macros/s/AKfycbxKuw9I0RDiTiVQzGK4NTHkwWkVQw3Qvh4kUcyWihALhCFAqsW58rXzygGUhPU7Pwwp/exec" 
        allow="geolocation; microphone; camera">
    </iframe>

    <script>
        const iframe = document.getElementById('portal-iframe');
        const loader = document.getElementById('loader-container');

        // जब Iframe पूरी तरह लोड हो जाए
        iframe.onload = function() {
            // लोडर को छुपाएं
            loader.style.display = 'none';
            // पोर्टल को दिखाएं
            iframe.style.visibility = 'visible';
        };
    </script>

</body>
</html>
